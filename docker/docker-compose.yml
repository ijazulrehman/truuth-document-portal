version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: truuth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truuth_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truuth_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - truuth-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: truuth-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@truuth.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truuth-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  truuth-network:
    driver: bridge
